<!DOCTYPE html>
<html>
  <head>
    <title>Local Node Info</title>
  </head>
  <body>
    <span id="chainId"></span>
    <span id="blockNumber"></span>

    <script
      src="./ethers-5.7.umd.min.js"
      type="application/javascript"
    ></script>
    <script type="module">
      const provider = new ethers.providers.JsonRpcProvider("http://localhost:8545");

      const network = await provider.getNetwork();
      const blockNumber = await provider.getBlockNumber();

      document.getElementById("chainId").textContent = network.chainId;
      document.getElementById("blockNumber").textContent = blockNumber;
    </script>
  </body>
</html>
